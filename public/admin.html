<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'"
    />
    <meta name="referrer" content="no-referrer" />
    <title>管理登录</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell narrow">
      <header class="toolbar">
        <div>
          <h1>管理登录</h1>
          <p>先通过门禁，再进入配置面板。</p>
        </div>
        <a class="link-button" href="/">返回统计</a>
      </header>

      <form id="loginForm" class="login-card">
        <label class="field field-full">
          <span>面板密码</span>
          <input name="admin_password" type="password" autocomplete="current-password" minlength="8" required />
        </label>
        <div class="actions form-actions">
          <button type="submit">进入管理面板</button>
        </div>
      </form>

      <section id="loginMessage" class="status-line"></section>
    </main>
    <script src="/config.js"></script>
    <script src="/admin.js" type="module"></script>
  </body>
</html>
