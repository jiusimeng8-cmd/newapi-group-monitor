<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'"
    />
    <meta name="referrer" content="no-referrer" />
    <meta
      name="description"
      content="New API Group Monitor 是一个部署在 Cloudflare Workers + D1 上的轻量分组成功率监控工具，用于公开展示 New API 各分组最近 1 小时、30 分钟和 5 分钟的请求可用性。A lightweight New API group success-rate monitor for Cloudflare Workers and D1."
    />
    <meta
      name="keywords"
      content="New API monitor, New API status page, group success rate, Cloudflare Workers, Cloudflare D1, API availability, New API 分组监控, 分组成功率, 接口可用性, 状态页"
    />
    <meta name="author" content="New API Group Monitor" />
    <meta name="robots" content="index,follow" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:title" content="New API Group Monitor - 分组成功率监控状态页" />
    <meta
      property="og:description"
      content="公开展示 New API 各分组最近 1H / 30min / 5min 请求成功率，使用 Cloudflare Workers 和 D1 部署，密钥仅保存在服务端。"
    />
    <meta property="og:site_name" content="New API Group Monitor" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="New API Group Monitor - Group Success-Rate Status Page" />
    <meta
      name="twitter:description"
      content="A lightweight public status page for New API group availability, powered by Cloudflare Workers and D1."
    />
    <title>New API Group Monitor - 分组成功率监控状态页</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell status-shell">
      <a class="back-link" href="/admin.html" aria-label="进入配置">‹ 配置</a>

      <header class="hero">
        <div class="hero-main">
          <div class="view-label">
            <span class="brand-mark">∿</span>
            <span>GROUP VIEW</span>
          </div>
          <h1>分组成功率</h1>
          <div class="hero-meta">
            <span id="groupCount">0 个分组</span>
            <span id="configStatus">公开监控</span>
            <span id="nextUpdateText">NEXT UPDATE IN --S</span>
          </div>
        </div>
        <div class="hero-side">
          <div class="operation-pill">
            <span class="dot"></span>
            <span id="statusText">加载中</span>
          </div>
          <div class="update-row">
            <span id="updatedText">-</span>
          </div>
        </div>
      </header>

      <section id="rows" class="card-grid" aria-live="polite"></section>
    </main>
    <script src="/config.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
