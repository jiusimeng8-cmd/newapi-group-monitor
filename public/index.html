<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'"
    />
    <meta name="referrer" content="no-referrer" />
    <title>New API Group Monitor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell status-shell">
      <a class="back-link" href="/admin.html" aria-label="进入配置">‹ 配置</a>

      <header class="hero">
        <div class="hero-main">
          <div class="view-label">
            <span class="brand-mark">∿</span>
            <span>GROUP VIEW</span>
          </div>
          <h1>分组成功率</h1>
          <div class="hero-meta">
            <span id="groupCount">0 个分组</span>
            <span id="configStatus">公开监控</span>
            <span id="nextUpdateText">NEXT UPDATE IN --S</span>
          </div>
        </div>
        <div class="hero-side">
          <div class="operation-pill">
            <span class="dot"></span>
            <span id="statusText">加载中</span>
          </div>
          <div class="update-row">
            <span id="updatedText">-</span>
          </div>
        </div>
      </header>

      <section id="rows" class="card-grid" aria-live="polite"></section>
    </main>
    <script src="/config.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
