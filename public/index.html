<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New API Group Monitor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="toolbar">
        <div>
          <h1>分组成功率</h1>
          <p id="summary">最近 1H / 30min / 5min 请求成功率</p>
        </div>
        <div class="actions">
          <a class="link-button" href="/admin.html">配置</a>
          <button id="refreshBtn" type="button">刷新</button>
        </div>
      </header>

      <section class="status-line">
        <span id="statusText">加载中</span>
        <span id="updatedText">-</span>
      </section>

      <section class="overview-grid" id="overview">
        <article>
          <span>分组数</span>
          <strong id="groupCount">-</strong>
        </article>
        
        
        <article>
          <span>整体成功率</span>
          <strong id="overallRate">-</strong>
        </article>
      </section>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>分组</th>
              <th>1H</th>
              <th>30min</th>
              <th>5min</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </section>
    </main>
    <script src="/config.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
