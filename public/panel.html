<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理面板</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell narrow">
      <header class="toolbar">
        <div>
          <h1>监控配置</h1>
          <p>密钥只提交到 Worker，不会存入浏览器。</p>
        </div>
        <a class="link-button" href="/">返回统计</a>
      </header>

      <form id="configForm" class="form">
        <label class="field field-full">
          <span>New API Base URL</span>
          <input name="base_url" type="url" placeholder="https://api.example.com" required />
        </label>
        <label class="field field-full">
          <span>系统访问令牌</span>
          <input name="access_token" type="text" autocomplete="off" placeholder="系统访问令牌" />
        </label>
        <label class="field">
          <span>User ID</span>
          <input name="user_id" inputmode="numeric" required />
        </label>
        <label class="field">
          <span>刷新间隔（秒）</span>
          <input name="refresh_interval_seconds" type="number" min="30" max="3600" value="60" required />
        </label>
        <div class="actions form-actions">
          <button id="loadBtn" type="button">读取配置</button>
          <button id="testBtn" type="button">测试连接</button>
          <button type="submit">保存并刷新</button>
        </div>
      </form>

      <section id="message" class="status-line"></section>

      <section class="panel-section">
        <div class="section-head">
          <div>
            <h2>渠道管理</h2>
            <p>选择哪些渠道显示在公开统计页。</p>
          </div>
          <div class="actions">
            <button id="showAllBtn" type="button">全选</button>
            <button id="hideAllBtn" type="button">全不选</button>
            <button id="saveChannelsBtn" type="button">保存渠道</button>
          </div>
        </div>
        <div id="channelList" class="channel-list"></div>
        <section id="channelMessage" class="status-line"></section>
      </section>
    </main>
    <script src="/config.js"></script>
    <script src="/admin.js" type="module"></script>
  </body>
</html>
